services:
  db:
    image: postgres:16
    container_name: hanuman-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hanuman
      POSTGRES_PASSWORD: hanuman
      POSTGRES_DB: hanuman
    ports:
      - "5433:5432"
    volumes:
      - hanuman_pg:/var/lib/postgresql/data

volumes:
  hanuman_pg:
