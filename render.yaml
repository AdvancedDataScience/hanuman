# Render Blueprint — สร้างครบทั้งเว็บ + API + ฐานข้อมูล จากไฟล์เดียว
# วิธีใช้: push repo ขึ้น GitHub แล้วที่ Render กด New > Blueprint ชี้มาที่ repo นี้

databases:
  - name: hanuman-db
    plan: free
    databaseName: hanuman
    user: hanuman

services:
  # ---------- Backend API ----------
  - type: web
    name: hanuman-api
    runtime: node
    plan: free
    buildCommand: >-
      npm install --legacy-peer-deps &&
      npm --workspace backend run prisma:generate &&
      npm --workspace backend run migrate:deploy &&
      npm --workspace backend run seed
    startCommand: npm --workspace backend run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hanuman-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COMMISSION_RATE
        value: "0.15"
      - key: PROMPTPAY_MERCHANT_ID
        value: "0000000000000"
      - key: NODE_VERSION
        value: "20"

  # ---------- Web (Static site, SPA) ----------
  - type: web
    name: hanuman-web
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm --workspace web run build
    staticPublishPath: ./web/dist
    envVars:
      - key: VITE_API_URL
        # ถ้าชื่อ service ไม่ชนกับใคร URL จะเป็นแบบนี้
        # ถ้า Render ตั้งชื่ออื่น ให้แก้ค่านี้เป็น URL จริงของ hanuman-api แล้ว deploy ซ้ำ
        value: https://hanuman-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
